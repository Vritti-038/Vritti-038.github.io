<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="mars" src="./IMAGES/mars-surface.avif" crossorigin="anonymous">
      </a-assets>

      <!-- Mars sphere spinning inside the box -->
      <a-sphere
        id="PGB-sphere"
        radius="0.5"
        position="0 2 -5.5"
        src="#mars"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"
      ></a-sphere>

      <!-- Wireframe box containing the sphere -->
      <a-box
        id="PGB-Box"
        position="0 2 -5.5"
        transparent="true"
        opacity="0.3"
        color="gray"
      ></a-box>

      <a-text
        value="Mars in a Box!"
        color="#FFFFFF"
        position="-1 3.5 -5.5"
        width="6"
      ></a-text>

      <a-sky color="#000000"></a-sky>
    </a-scene>
  </body>
</html>
