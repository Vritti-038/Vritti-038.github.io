<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <script>
      AFRAME.registerComponent('my-color-toggle', {
        init: function() {
          let el = this.el;
          let originalColor = el.getAttribute('color');
          let toggled = false;

          this.toggleColor = function() {
            toggled = !toggled;
            el.setAttribute('color', toggled ? 'orange' : originalColor);
          };

          this.el.addEventListener('click', this.toggleColor, { passive: true });
        },
        remove: function() {
          this.el.removeEventListener('click', this.toggleColor);
        }
      });
    </script>

    <a-scene cursor="rayOrigin: mouse;" raycaster="objects: .rayclick;">
      <a-box id="one" position="-2 0 -7" color="red" class="rayclick" my-color-toggle></a-box>
      <a-box id="two" position="0 0 -7" color="blue" class="rayclick" my-color-toggle></a-box>
      <a-box id="three" position="2 0 -7" color="green" class="rayclick" my-color-toggle></a-box>
      <a-sphere position="1 5 -2" geometry="radius: 0.5" color="blue"></a-sphere>
    </a-scene>
  </body>
</html>
